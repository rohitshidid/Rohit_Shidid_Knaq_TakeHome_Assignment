services:
  db:
    image: postgres:16-alpine
    container_name: knaq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-knaq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knaq_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-knaq}
    ports:
      - "5432:5432"
    volumes:
      - knaq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knaq} -d ${POSTGRES_DB:-knaq}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    container_name: knaq-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network the DB host is the service name "db".
      DATABASE_URL: postgresql://${POSTGRES_USER:-knaq}:${POSTGRES_PASSWORD:-knaq_dev_pw}@db:5432/${POSTGRES_DB:-knaq}?schema=public
      API_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      # Provide the source messages to seed/ingest (read-only).
      - ./data:/app/data:ro

  web:
    build:
      context: ./web
    container_name: knaq-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    # The browser (on the host) calls the API at localhost:8000, which the
    # default NEXT_PUBLIC_API_URL already points to — no extra config needed.

volumes:
  knaq_pgdata:
